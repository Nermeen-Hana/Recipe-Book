kind = "web"
previewPath = "/"
title = "Nermeen's Recipe Book"
version = "1.0.0"
id = "recipe-book-flask-app"

[[services]]
localPort = 5000
name = "Recipe Book"
paths = ["/"]

[services.env]
PORT = "5000"

[services.development]
run = "gunicorn --bind 0.0.0.0:$PORT --reuse-port --reload app:app"

[services.production]

[services.production.build]
args = ["echo", "no-build"]

[services.production.run]
args = ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "app:app"]

[services.production.run.env]
PORT = "5000"
